<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liverpool FC Fixtures</title>
  <meta name="theme-color" content="#C8102E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem; }
    .header { background: #C8102E; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
    .header-text h1 { color: #fff; font-size: 20px; font-weight: 600; }
    .header-text p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 2px; }
    .crest { width: 48px; height: 48px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: #C8102E; color: #fff; border-color: #C8102E; }
    .fixture-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px; }
    .fixture-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .competition { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .date { font-size: 12px; color: #888; }
    .matchup { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .team { font-size: 15px; font-weight: 600; color: #111; flex: 1; }
    .team.away { text-align: right; }
    .team.lfc { color: #C8102E; }
    .score { font-size: 18px; font-weight: 700; color: #111; padding: 0 8px; flex-shrink: 0; }
    .venue { font-size: 12px; color: #aaa; margin-top: 6px; }
    .result-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; margin-top: 6px; }
    .result-w { background: #e6f4ea; color: #2e7d32; }
    .result-d { background: #fff8e1; color: #f57f17; }
    .result-l { background: #fce8e6; color: #c62828; }
    .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
    .error { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; padding: 1rem; color: #c00; font-size: 14px; margin-bottom: 10px; }
    .count { font-size: 13px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="crest">LFC</div>
    <div class="header-text">
      <h1>Liverpool FC</h1>
      <p id="subtitle">Recent results</p>
    </div>
  </div>
  <div class="filter-row" id="filters"></div>
  <div class="count" id="count"></div>
  <div id="fixtures-list"><div class="loading">Loading...</div></div>
</div>

<script>
let allMatches = [];
let activeFilter = 'All';

async function fetchFixtures() {
  try {
    const res = await fetch('/api/fixtures');
    if (!res.ok) throw new Error('Server error ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    allMatches = data.response || [];
    if (!allMatches.length) throw new Error('No matches found');
    buildFilters();
    renderFixtures();
  } catch(e) {
    document.getElementById('fixtures-list').innerHTML =
      `<div class="error">Could not load fixtures.<br><small>${e.message}</small></div>`;
  }
}

function buildFilters() {
  const comps = ['All', ...new Set(allMatches.map(m => m.league.name))];
  const row = document.getElementById('filters');
  row.innerHTML = comps.map(c =>
    `<button class="filter-btn${c === 'All' ? ' active' : ''}" onclick="setFilter('${c.replace(/'/g,"\\'")}')">
      ${c === 'All' ? 'All' : c}
    </button>`
  ).join('');
}

function setFilter(comp) {
  activeFilter = comp;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (comp === 'All' ? 'All' : comp));
  });
  renderFixtures();
}

function getResult(m) {
  const lfcHome = m.teams.home.name === 'Liverpool';
  const lfcGoals = lfcHome ? m.goals.home : m.goals.away;
  const oppGoals = lfcHome ? m.goals.away : m.goals.home;
  if (lfcGoals > oppGoals) return { label: 'W', cls: 'result-w' };
  if (lfcGoals < oppGoals) return { label: 'L', cls: 'result-l' };
  return { label: 'D', cls: 'result-d' };
}

function renderFixtures() {
  const filtered = activeFilter === 'All'
    ? allMatches
    : allMatches.filter(m => m.league.name === activeFilter);

  document.getElementById('count').textContent = filtered.length
    ? `${filtered.length} match${filtered.length !== 1 ? 'es' : ''}` : '';

  if (!filtered.length) {
    document.getElementById('fixtures-list').innerHTML = `<div class="loading">No matches found.</div>`;
    return;
  }

  document.getElementById('fixtures-list').innerHTML = filtered.map(m => {
    const d = new Date(m.fixture.date);
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    const isHome = m.teams.home.name === 'Liverpool';
    const homeClass = `team${isHome ? ' lfc' : ''}`;
    const awayClass = `team away${!isHome ? ' lfc' : ''}`;
    const finished = m.fixture.status.short === 'FT' || m.fixture.status.short === 'AET' || m.fixture.status.short === 'PEN';
    const result = finished ? getResult(m) : null;
    const scoreHtml = finished
      ? `<span class="score">${m.goals.home} - ${m.goals.away}</span>`
      : `<span class="score" style="font-size:13px;color:#aaa;">vs</span>`;
    const venueName = isHome ? 'Anfield' : (m.fixture.venue.name || 'Away');

    return `<div class="fixture-card">
      <div class="fixture-meta">
        <span class="competition">${m.league.name}</span>
        <span class="date">${dateStr}</span>
      </div>
      <div class="matchup">
        <span class="${homeClass}">${m.teams.home.name}</span>
        ${scoreHtml}
        <span class="${awayClass}">${m.teams.away.name}</span>
      </div>
      <div class="venue">${isHome ? 'Home' : 'Away'} · ${venueName}
        ${result ? `<span class="result-badge ${result.cls}">${result.label}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

fetchFixtures();
</script>
</body>
</html>
