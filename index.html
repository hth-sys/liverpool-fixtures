<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liverpool FC Fixtures</title>
  <meta name="theme-color" content="#C8102E" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f4f4f4; }
    .app { max-width: 480px; margin: 0 auto; padding: 1rem; }
    .header { background: #C8102E; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; display: flex; align-items: center; gap: 12px; }
    .header-text h1 { color: #fff; font-size: 20px; font-weight: 600; }
    .header-text p { color: rgba(255,255,255,0.75); font-size: 13px; margin-top: 2px; }
    .crest { width: 48px; height: 48px; background: rgba(255,255,255,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: #fff; flex-shrink: 0; }
    .filter-row { display: flex; gap: 8px; margin-bottom: 1rem; flex-wrap: wrap; }
    .filter-btn { padding: 6px 14px; border-radius: 20px; border: 1px solid #ddd; background: #fff; color: #555; font-size: 13px; cursor: pointer; }
    .filter-btn.active { background: #C8102E; color: #fff; border-color: #C8102E; }
    .fixture-card { background: #fff; border: 1px solid #eee; border-radius: 14px; padding: 1rem 1.25rem; margin-bottom: 10px; }
    .fixture-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .competition { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .date { font-size: 12px; color: #888; }
    .matchup { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .team { font-size: 15px; font-weight: 600; color: #111; flex: 1; }
    .team.away { text-align: right; }
    .team.lfc { color: #C8102E; }
    .vs { font-size: 12px; color: #aaa; padding: 0 4px; flex-shrink: 0; }
    .venue { font-size: 12px; color: #aaa; margin-top: 6px; }
    .loading { text-align: center; padding: 2rem; color: #888; font-size: 14px; }
    .error { background: #fff0f0; border: 1px solid #ffcccc; border-radius: 10px; padding: 1rem; color: #c00; font-size: 14px; margin-bottom: 10px; }
    .count { font-size: 13px; color: #888; margin-bottom: 10px; }
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="crest">LFC</div>
    <div class="header-text">
      <h1>Liverpool FC</h1>
      <p>Upcoming fixtures</p>
    </div>
  </div>
  <div class="filter-row" id="filters"></div>
  <div class="count" id="count"></div>
  <div id="fixtures-list"><div class="loading">Loading fixtures...</div></div>
</div>

<script>
const API_KEY = 'dcc0c6af914942f69e8627a58c86bb8d';
const LFC_ID = 64;
let allMatches = [];
let activeFilter = 'All';

async function fetchFixtures() {
  try {
    const target = `https://api.football-data.org/v4/teams/${LFC_ID}/matches?status=SCHEDULED&token=${API_KEY}`;
    const proxyUrl = `https://thingproxy.freeboard.io/fetch/${target}`;
    const res = await fetch(proxyUrl);
    if (!res.ok) throw new Error('API error ' + res.status);
    const data = await res.json();
    allMatches = data.matches || [];
    if (!allMatches.length) throw new Error('No matches returned');
    buildFilters();
    renderFixtures();
  } catch(e) {
    document.getElementById('fixtures-list').innerHTML =
      `<div class="error">Could not load fixtures.<br><small>${e.message}</small></div>`;
  }
}

function buildFilters() {
  const comps = ['All', ...new Set(allMatches.map(m => m.competition.name))];
  const row = document.getElementById('filters');
  row.innerHTML = comps.map(c =>
    `<button class="filter-btn${c === 'All' ? ' active' : ''}" onclick="setFilter('${c.replace(/'/g,"\\'")}')">
      ${c === 'All' ? 'All competitions' : c}
    </button>`
  ).join('');
}

function setFilter(comp) {
  activeFilter = comp;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === (comp === 'All' ? 'All competitions' : comp));
  });
  renderFixtures();
}

function renderFixtures() {
  const filtered = activeFilter === 'All' ? allMatches : allMatches.filter(m => m.competition.name === activeFilter);
  document.getElementById('count').textContent = filtered.length
    ? `${filtered.length} upcoming match${filtered.length !== 1 ? 'es' : ''}` : '';

  if (!filtered.length) {
    document.getElementById('fixtures-list').innerHTML = `<div class="loading">No upcoming fixtures found.</div>`;
    return;
  }

  document.getElementById('fixtures-list').innerHTML = filtered.slice(0, 30).map(m => {
    const d = new Date(m.utcDate);
    const dateStr = d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
    const timeStr = d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
    const isHome = m.homeTeam.id === LFC_ID;
    const homeClass = `team${isHome ? ' lfc' : ''}`;
    const awayClass = `team away${!isHome ? ' lfc' : ''}`;
    return `<div class="fixture-card">
      <div class="fixture-meta">
        <span class="competition">${m.competition.name}</span>
        <span class="date">${dateStr} · ${timeStr}</span>
      </div>
      <div class="matchup">
        <span class="${homeClass}">${m.homeTeam.shortName || m.homeTeam.name}</span>
        <span class="vs">vs</span>
        <span class="${awayClass}">${m.awayTeam.shortName || m.awayTeam.name}</span>
      </div>
      <div class="venue">${isHome ? 'Home · Anfield' : 'Away'}</div>
    </div>`;
  }).join('');
}

fetchFixtures();
</script>
</body>
</html>
